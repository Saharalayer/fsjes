<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background-color: #0a1f44; /* أزرق داكن */

    header {
      background-color: #0a1f44;
      padding: 15px;
      text-align: center;

    header img {

    nav a {
      color: #d4af37;

      padding: 10px 15px;
      transition: 0.3s;
    }
    nav a:hover {
      background-color: #d4af37;
      color: #0a1f44;
    }
    .hero {
      text-align: center;
      padding: 50px 20px;
    }
    .hero h2 {
      color: #d4af37;
    }
    .buttons {
      margin-top: 20px;
    }
    .buttons a {
      background-color: #d4af37;
      color: #0a1f44;
      padding: 10px 20px;
      margin: 10px;
      text-decoration: none;
      border-radius: 5px;
      transition: 0.3s;
    }
    .buttons a:hover {
